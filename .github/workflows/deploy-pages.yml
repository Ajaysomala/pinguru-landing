name: Deploy Vite Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify built entrypoints
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still references /src/main.tsx"
            exit 1
          fi
          if ! grep -Eq '/assets/index-[^"]+\.js' dist/index.html; then
            echo "ERROR: dist/index.html is missing hashed JS bundle reference"
            sed -n '1,120p' dist/index.html
            exit 1
          fi
          if [ ! -f dist/404.html ]; then
            echo "ERROR: dist/404.html is missing. SPA fallback is required for direct route loads on GitHub Pages."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
