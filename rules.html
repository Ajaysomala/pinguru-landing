<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Rules — PinGuru</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.pinguru.me; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/app-shell.css" />
    <link rel="stylesheet" href="css/rules.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Dashboard navigation">
        <a href="/dashboard.html" class="sidebar-logo">PinGuru</a>
        <div class="sidebar-section-label">Main</div>
        <nav class="sidebar-nav">
          <a href="/dashboard.html" class="sidebar-link">
            <span>🏠</span> Dashboard
          </a>
          <a href="/rules.html" class="sidebar-link active">
            <span>⚡</span> Automation Rules
          </a>
          <a href="/connect.html" class="sidebar-link">
            <span>📸</span> Instagram
          </a>
          <a href="/settings.html" class="sidebar-link">
            <span>⚙️</span> Settings
          </a>
          <a href="/pricing.html" class="sidebar-link">
            <span>💎</span> Billing & Plans
          </a>
        </nav>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-account">
          <div class="sidebar-user">
            <div class="user-avatar" id="user-avatar">A</div>
            <div>
              <div class="user-name" id="sidebar-user-name">Loading...</div>
              <div class="user-email" id="sidebar-user-email">Loading...</div>
              <div class="user-plan" id="sidebar-user-plan">Free</div>
            </div>
          </div>
          <button class="logout-btn" id="sidebar-logout-btn" type="button">
            Sign out
          </button>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <div>
            <div class="topbar-title">Automation Rules</div>
            <div class="topbar-subtitle">
              Create and manage keyword-based auto-replies
            </div>
          </div>
          <div class="topbar-right">
            <a href="/dashboard.html" class="btn-secondary">← Back</a>
          </div>
        </div>

        <div class="rules-body">
          <!-- Rules List -->
          <section class="rules-section">
            <h2 class="section-title">Your Rules</h2>
            <div id="rules-list">
              <p class="loading-text">Loading...</p>
            </div>
          </section>

          <!-- Create Rule Form -->
          <section class="rules-section">
            <h2 class="section-title">Create New Rule</h2>

            <div
              class="alert alert-error"
              id="rule-error"
              style="display: none"
            ></div>
            <div
              class="alert alert-success"
              id="rule-success"
              style="display: none"
            >
              Rule created successfully! ✅
            </div>

            <form id="create-rule-form" class="rule-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="rule-name">Rule Name</label>
                  <input
                    type="text"
                    id="rule-name"
                    placeholder="e.g. Price inquiry"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="trigger-type">Trigger Type</label>
                  <select id="trigger-type">
                    <option value="keyword">Keyword DM</option>
                    <option value="comment">Comment</option>
                    <option value="story_reply">Story Reply</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label>Keywords (press Enter or click Add)</label>
                <div class="keywords-input-wrap">
                  <input
                    type="text"
                    id="keyword-input"
                    placeholder="e.g. price, info, link"
                  />
                  <button type="button" id="add-keyword-btn">Add</button>
                </div>
                <div class="keywords-tags" id="keywords-tags"></div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="match-mode">Match Mode</label>
                  <select id="match-mode">
                    <option value="exact">Exact</option>
                    <option value="contains">Contains</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label for="reply-message">Auto Reply Message</label>
                <textarea
                  id="reply-message"
                  rows="3"
                  placeholder="Hey! Thanks for reaching out 👋 Here's the link: ..."
                  required
                ></textarea>
              </div>

              <button type="submit" class="btn-primary" id="create-btn">
                Create Rule
              </button>
            </form>
          </section>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app-shell.js"></script>
    <script src="js/rules.js"></script>
  </body>
</html>
