<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Rules — PinGuru</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.pinguru.me; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/rules.css" />
  </head>
  <body>
    <nav>
      <a href="/dashboard.html" class="logo">PinGuru</a>
      <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/rules.html">Rules</a>
        <a href="/connect.html">Instagram</a>
        <a href="#" id="logout-btn" class="nav-cta">Logout</a>
      </div>
      <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/rules.html">Rules</a>
      <a href="/connect.html">Instagram</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="rules-page">
      <div class="rules-header">
        <h1>Automation Rules</h1>
        <a href="/dashboard.html" class="btn-secondary">← Dashboard</a>
      </div>

      <!-- Rules List -->
      <div id="rules-list">
        <p style="color: var(--muted); font-size: 0.86rem">Loading...</p>
      </div>

      <!-- Create Rule Form -->
      <div class="create-rule-section">
        <h2>Create New Rule</h2>

        <div
          class="alert alert-error"
          id="rule-error"
          style="display: none"
        ></div>
        <div
          class="alert alert-success"
          id="rule-success"
          style="display: none"
        >
          Rule created successfully! ✅
        </div>

        <form id="create-rule-form">
          <div class="form-row">
            <div class="form-group">
              <label for="rule-name">Rule Name</label>
              <input
                type="text"
                id="rule-name"
                placeholder="e.g. Price inquiry"
                required
              />
            </div>
            <div class="form-group">
              <label for="trigger-type">Trigger Type</label>
              <select id="trigger-type">
                <option value="keyword">Keyword DM</option>
                <option value="comment">Comment</option>
                <option value="story_reply">Story Reply</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Keywords (press Enter or click Add)</label>
            <div class="keywords-input-wrap">
              <input
                type="text"
                id="keyword-input"
                placeholder="e.g. price, info, link"
              />
              <button type="button" id="add-keyword-btn">Add</button>
            </div>
            <div class="keywords-tags" id="keywords-tags"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="match-mode">Match Mode</label>
              <select id="match-mode">
                <option value="exact">Exact</option>
                <option value="contains">Contains</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="reply-message">Auto Reply Message</label>
            <textarea
              id="reply-message"
              rows="3"
              placeholder="Hey! Thanks for reaching out 👋 Here's the link: ..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-primary" id="create-btn">
            Create Rule
          </button>
        </form>
      </div>
    </div>

    <footer>
      <p>© 2026 PinGuru</p>
      <div class="footer-links">
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
      </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/rules.js"></script>
    <script>
      function toggleMobileMenu() {
        document.getElementById("mobile-menu").classList.toggle("open");
      }

      (async () => {
        await requireAuth();
        const profile = await getProfile();
        if (!profile) return;
        if (!profile.instagram_connected) {
          const rulesPage = document.querySelector(".rules-page");
          if (rulesPage) {
            rulesPage.innerHTML = `
              <div style="text-align:center;padding:80px 20px">
                <div style="font-size:2.5rem;margin-bottom:16px">📸</div>
                <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:10px">Connect Instagram First</h2>
                <p style="color:var(--muted);margin-bottom:24px;font-size:0.9rem">You need to connect your Instagram account before creating automation rules.</p>
                <a href="/connect.html" class="btn-primary">Connect Instagram →</a>
              </div>`;
          }
        }
      })();
    </script>
  </body>
</html>
