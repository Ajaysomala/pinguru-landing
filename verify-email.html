<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email — PinGuru</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.pinguru.me; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <nav>
      <a href="/" class="logo">PinGuru</a>
      <div class="nav-links">
        <a href="/login.html">Sign in</a>
      </div>
    </nav>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo"><div class="logo">PinGuru</div></div>
        <h1 class="auth-title">Verify your email</h1>
        <p class="auth-sub" id="verify-sub">
          Enter the 6-digit code sent to your email.
        </p>

        <div
          class="alert alert-error"
          id="error-msg"
          style="display: none"
        ></div>
        <div
          class="alert alert-success"
          id="success-msg"
          style="display: none"
        ></div>

        <form id="verify-form">
          <div class="form-group">
            <label for="verify-email">Email address</label>
            <input
              type="email"
              id="verify-email"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="otp">Verification code</label>
            <input
              type="text"
              id="otp"
              placeholder="6-digit OTP"
              maxlength="6"
              pattern="[0-9]{6}"
              inputmode="numeric"
              required
            />
          </div>
          <button type="submit" class="auth-submit" id="verify-btn">
            Verify & Continue
          </button>
        </form>

        <div class="auth-footer">
          Didn't receive code?
          <a href="#" id="resend-link">Resend OTP</a>
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/verify-email.js"></script>
  </body>
</html>
