<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal — PinGuru</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://api.pinguru.me; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <style>
      .admin-banner {
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        padding: 8px;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="admin-banner">🔐 Restricted ADMIN ACCESS</div>

    <nav>
      <a href="/" class="logo">PinGuru</a>
      <div class="nav-links">
        <a href="/" style="color: var(--muted)">Back to Home</a>
      </div>
    </nav>

    <div class="auth-page">
      <div
        class="auth-card"
        style="max-width: 380px; border: 1.5px solid var(--accent)"
      >
        <div
          class="admin-banner"
          style="
            margin: -40px -36px 28px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            border-radius: 16px 16px 0 0;
            padding: 12px;
          "
        >
          🔐 ADMIN LOGIN
        </div>
        <h1 class="auth-title">Admin Portal</h1>
        <p class="auth-sub">
          Restricted access — PinGuru authorized admins only
        </p>

        <div class="lockout-msg" id="lockout-msg"></div>
        <div
          class="alert alert-error"
          id="error-msg"
          style="display: none"
        ></div>

        <form id="admin-form">
          <div class="form-group">
            <label for="admin-email">Admin Email</label>
            <input
              type="email"
              id="admin-email"
              placeholder="admin@pinguru.me"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="admin-password">Admin Password</label>
            <input
              type="password"
              id="admin-password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
          <p class="attempts-warning" id="attempts-warning"></p>
          <button type="submit" class="auth-submit" id="admin-btn">
            Authenticate
          </button>
        </form>

        <div
          class="auth-footer"
          style="
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--red);
          "
        >
          This page is protected. Unauthorized access is logged.
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/security.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const adminForm = document.getElementById("admin-form");
        const lockoutMsg = document.getElementById("lockout-msg");
        const errorMsg = document.getElementById("error-msg");
        const submitBtn = document.getElementById("admin-btn");

        if (adminForm) {
          adminForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            if (isLockedOut()) {
              startLockoutCountdown(lockoutMsg);
              return;
            }

            const email = document.getElementById("admin-email").value.trim();
            const password = document.getElementById("admin-password").value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
              const res = await fetch("https://api.pinguru.me/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              });
              const data = await res.json();
              if (!res.ok)
                throw new Error(data.detail || "Authentication failed");

              resetAttempts();
              localStorage.setItem("pg_admin_token", data.token);
              // Redirect to admin dashboard (to be created)
              window.location.href = "/admin-dashboard.html";
            } catch (err) {
              const result = recordAttempt();
              if (result.locked) {
                startLockoutCountdown(lockoutMsg);
              } else {
                const warn = document.getElementById("attempts-warning");
                if (warn) {
                  warn.style.display = "block";
                  warn.textContent = `${result.remaining} attempt${result.remaining !== 1 ? "s" : ""} remaining before 30-second lockout`;
                }
              }
              if (errorMsg) {
                errorMsg.style.display = "block";
                errorMsg.textContent = err.message || "Invalid credentials";
              }
              submitBtn.disabled = false;
              submitBtn.innerHTML = "Authenticate";
            }
          });
        }
      });
    </script>
  </body>
</html>
