<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — PinGuru</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://accounts.google.com https://apis.google.com https://api.pinguru.me; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <nav>
      <a href="/" class="logo">PinGuru</a>
      <div class="nav-links">
        <a href="/login.html">Sign in</a>
      </div>
    </nav>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo"><div class="logo">PinGuru</div></div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Start automating your Instagram DMs for free</p>

        <div
          class="alert alert-error"
          id="error-msg"
          style="display: none"
        ></div>
        <div class="alert alert-success" id="success-msg" style="display: none">
          Account created! Redirecting to login...
        </div>

        <form id="register-form">
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="password">Password (minimum 12 characters)</label>
            <input
              type="password"
              id="password"
              placeholder="Min. 12 characters with uppercase, lowercase, number & symbol"
              required
              autocomplete="new-password"
              oninput="renderPasswordRules('password-requirements', this.value)"
            />
            <div id="password-requirements"></div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input
              type="password"
              id="confirm-password"
              placeholder="Repeat password"
              required
              autocomplete="new-password"
            />
          </div>
          <button type="submit" class="auth-submit" id="register-btn">
            Create Account
          </button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

        <!-- Google Sign-In Button -->
        <div
          id="g_id_onload"
          data-client_id="YOUR_GOOGLE_CLIENT_ID"
          data-callback="handleGoogleSignIn"
          data-auto_prompt="false"
        ></div>
        <div class="g_id_signin" data-type="standard"></div>

        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
        <div class="auth-footer" style="margin-top: 10px; font-size: 0.75rem">
          By creating an account you agree to our
          <a href="/terms.html">Terms</a> and
          <a href="/privacy.html">Privacy Policy</a>
        </div>
      </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/password-validator.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/oauth.js"></script>
  </body>
</html>
